services:
  postgres:
    image: postgres:16
    container_name: boneless-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: boneless
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - boneless_pg_data:/var/lib/postgresql/data

volumes:
  boneless_pg_data:
